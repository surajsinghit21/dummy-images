apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cronjob

spec:
  schedule: "* * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello
            image: busybox

            command:
            - /bin/sh
            - -c
            - date && echo "Hello from Kubernetes Cron Job"

          restartPolicy: OnFailure