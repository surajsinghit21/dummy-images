apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enterprise-Ingress
  namespace: dummy-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb

  rules:
  - http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: netflix-app
            port:
              number: 3000

      - path: /users
        pathType: Prefix
        backend:
          service:
            name: users-service
            port:
              number: 80

      - path: /orders
        pathType: Prefix
        backend:
          service:
            name: orders-service
            port:
              number: 80

      - path: /products
        pathType: Prefix
        backend:
          service:
            name: products-service
            port:
              number: 80

      - path: /payment
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 80

      - path: /inventory
        pathType: Prefix
        backend:
          service:
            name: inventory-service
            port:
              number: 80
