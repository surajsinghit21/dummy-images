apiVersion: apps/v1
kind: Deployment

metadata:
  name: products
  namespace: dummy-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: products

  template:
    metadata:
      labels:
        app: products

    spec:
      containers:
      - name: products

        image: hashicorp/http-echo

        args:
        - "-text=Products Service"

        ports:
        - containerPort: 5678